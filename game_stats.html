<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏数据统计</title>
    <style>
        :root {
            --primary-color: #2A2A2A;
            --accent-color: #FF6B6B;
            --gradient-bg: linear-gradient(135deg, #2A2A2A 0%, #1A1A1A 100%);
            --text-light: #F8F9FA;
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            max-width: 1000px;
            margin: 20px auto;
            padding: 0 20px;
            background: #f8f9fa;
        }

        h1 {
            background: var(--gradient-bg);
            color: var(--text-light);
            padding: 2rem;
            text-align: center;
            border-radius: 15px;
            box-shadow: var(--shadow-sm);
            margin: 2rem auto;
            position: relative;
            overflow: hidden;
        }

        h1::after {
            content: '';
            position: absolute;
            bottom: -15px;
            left: -10%;
            right: -10%;
            height: 30px;
            background: #fff;
            transform: rotate(-3deg);
            z-index: 1;
        }

        .table-container {
            overflow-x: auto;
            border-radius: 15px;
            box-shadow: 0 3px 15px rgba(0,0,0,0.1);
            background: white;
            transition: transform 0.3s ease;
        }

        .table-container:hover {
            transform: translateY(-3px);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            transition: all 0.3s ease;
        }

        th, td {
            padding: 14px 18px;
            text-align: left;
            border-bottom: 1px solid #eee;
            transition: background 0.3s;
        }

        th {
            background-color: var(--primary-color);
            color: white;
            font-weight: 600;
            cursor: pointer;
            position: relative;
        }

        th:hover {
            background-color: #3A3A3A;
        }

        th.active-sort {
            background-color: var(--accent-color);
        }

        tr:hover {
            background-color: #fff9f9;
        }

        tr:nth-child(even) {
            background-color: #fcfcfc;
        }

        .sort-indicator {
            display: inline-block;
            margin-left: 8px;
            font-size: 0.9em;
            transition: transform 0.3s;
        }

        td:first-child {
            font-weight: 500;
            color: #666;
            background-color: #fcfcfc;
        }

        @media (max-width: 768px) {
            body {
                padding: 0 15px;
            }

            h1 {
                font-size: 1.5rem;
                padding: 1.5rem;
            }

            th, td {
                padding: 12px;
                font-size: 0.9em;
            }
        }
    </style>
</head>
<body>
    <h1>全角色汇总统计</h1>
    <div class="table-container">
        <table id="statsTable">
            <thead>
                <tr>
                    <th>序号</th>
                    <th>选手 <span class="sort-indicator"></span></th>
                    <th>胜场数 <span class="sort-indicator"></span></th>
                    <th>负场数 <span class="sort-indicator"></span></th>
                    <th>总场数 <span class="sort-indicator"></span></th>
                    <th>胜率 <span class="sort-indicator"></span></th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script>
        let sortState = {
            column: null,
            direction: 'desc' // 默认降序
        };

        // 加载数据部分保持不变...

        // 修改后的排序函数
        function sortTable(columnIndex) {
            const tbody = document.getElementById('tableBody');
            const rows = Array.from(tbody.rows);
            
            // 清除之前的排序状态
            document.querySelectorAll('th').forEach(th => th.classList.remove('active-sort'));

            // 设置新排序状态
            if (sortState.column === columnIndex) {
                sortState.direction = sortState.direction === 'asc' ? 'desc' : 'asc';
            } else {
                sortState.column = columnIndex;
                sortState.direction = 'desc'; // 新列默认降序
            }

            // 添加当前排序状态
            document.querySelectorAll('th')[columnIndex + 1].classList.add('active-sort');

            // 排序逻辑保持不变...

            // 更新指示器
            const indicator = document.querySelectorAll('.sort-indicator')[columnIndex];
            indicator.textContent = sortState.direction === 'asc' ? '▽' : '△';
            indicator.style.transform = sortState.direction === 'asc' ? 'rotate(180deg)' : '';

            // 添加排序动画
            tbody.style.opacity = '0';
            setTimeout(() => {
                tbody.style.opacity = '1';
                tbody.innerHTML = '';
                rows.forEach(row => tbody.appendChild(row));
                updateRowNumbers();
            }, 300);
        }

        // 其他函数保持不变...
    </script>
</body>
</html>
