<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏数据统计</title>
    <style>
        :root {
            --space-blue: #0a1a2f;
            --neon-cyan: #00f3ff;
            --cyber-purple: #7d12ff;
            --hologram-pink: #ff00d4;
            --future-silver: #e0e7ff;
        }

        body {
            font-family: 'Orbitron', 'Segoe UI', sans-serif;
            max-width: 1000px;
            margin: 20px auto;
            padding: 0 20px;
            background: linear-gradient(135deg, var(--space-blue) 0%, #020c1a 100%);
            color: var(--future-silver);
        }

        h1 {
            text-align: center;
            padding: 1.5rem;
            margin: 2rem 0;
            font-size: 2.5rem;
            background: linear-gradient(90deg, var(--neon-cyan), var(--cyber-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 15px rgba(0, 243, 255, 0.3);
            border-bottom: 3px solid var(--neon-cyan);
            position: relative;
        }

        .table-container {
            overflow-x: auto;
            border-radius: 12px;
            background: rgba(10, 26, 47, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid var(--neon-cyan);
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.2);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: transparent;
        }

        th, td {
            padding: 16px 20px;
            text-align: left;
            border-bottom: 1px solid rgba(0, 243, 255, 0.1);
        }

        th {
            background: linear-gradient(180deg, rgba(0, 243, 255, 0.15), transparent);
            color: var(--neon-cyan);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        th:hover {
            background: rgba(0, 243, 255, 0.2);
            text-shadow: 0 0 10px var(--neon-cyan);
        }

        th.active-sort {
            background: linear-gradient(180deg, var(--cyber-purple), rgba(125, 18, 255, 0.3));
        }

        tr:hover {
            background: rgba(0, 243, 255, 0.05);
        }

        tr:nth-child(even) {
            background: rgba(255, 0, 212, 0.03);
        }

        .sort-indicator {
            display: inline-block;
            margin-left: 8px;
            font-size: 0.9em;
            transition: transform 0.3s;
        }

        td:first-child {
            color: var(--neon-cyan);
            font-family: 'Courier New', monospace;
        }

        @media (max-width: 768px) {
            body {
                padding: 0 15px;
            }

            h1 {
                font-size: 1.8rem;
                padding: 1rem;
            }

            th, td {
                padding: 12px;
                font-size: 0.9em;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <h1>全角色数据面板</h1>
    <div class="table-container">
        <table id="statsTable">
            <thead>
                <tr>
                    <th>序号</th>
                    <th>选手 <span class="sort-indicator"></span></th>
                    <th>胜场数 <span class="sort-indicator"></span></th>
                    <th>负场数 <span class="sort-indicator"></span></th>
                    <th>总场数 <span class="sort-indicator"></span></th>
                    <th>胜率 <span class="sort-indicator"></span></th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script>
        let sortState = {
            column: null,
            direction: 'desc'
        };

        async function loadData() {
            try {
                const response = await fetch('data/data.csv');
                const data = await response.text();
                processData(data);
            } catch (error) {
                console.error('加载数据失败:', error);
                alert('数据加载失败，请检查文件路径');
            }
        }

        function processData(csv) {
            const cleanCSV = csv.replace(/^\uFEFF/, '');
            const rows = cleanCSV.split('\n').filter(row => row.trim() !== '');
            const tableBody = document.getElementById('tableBody');
            
            // 跳过前两行标题
            const dataRows = rows.slice(2);

            dataRows.forEach((row, index) => {
                const cols = row.split(',').map(col => col.trim());
                if (cols.length === 5) {
                    const tr = document.createElement('tr');
                    
                    tr.innerHTML = `
                        <td>${index + 1}</td>
                        <td>${cols[0]}</td>
                        <td>${cols[1]}</td>
                        <td>${cols[2]}</td>
                        <td>${cols[3]}</td>
                        <td>${cols[4]}</td>
                    `;
                    tableBody.appendChild(tr);
                }
            });

            document.querySelectorAll('th').forEach((th, index) => {
                if (index === 0) return;
                th.addEventListener('click', () => sortTable(index - 1));
            });
        }

        function sortTable(columnIndex) {
            const tbody = document.getElementById('tableBody');
            const rows = Array.from(tbody.rows);
            
            document.querySelectorAll('th').forEach(th => th.classList.remove('active-sort'));
            document.querySelectorAll('.sort-indicator').forEach(span => span.textContent = '');

            if (sortState.column === columnIndex) {
                sortState.direction = sortState.direction === 'asc' ? 'desc' : 'asc';
            } else {
                sortState.column = columnIndex;
                sortState.direction = 'desc';
            }

            const currentTh = document.querySelectorAll('th')[columnIndex + 1];
            currentTh.classList.add('active-sort');
            const indicator = currentTh.querySelector('.sort-indicator');

            rows.sort((a, b) => {
                const aVal = a.cells[columnIndex + 1].textContent;
                const bVal = b.cells[columnIndex + 1].textContent;
                
                // 处理胜率列
                if (columnIndex === 4) {
                    const numA = parseFloat(aVal.replace('%', ''));
                    const numB = parseFloat(bVal.replace('%', ''));
                    return sortState.direction === 'asc' ? numA - numB : numB - numA;
                }
                
                // 处理数值列
                if (columnIndex > 0) {
                    const numA = parseInt(aVal);
                    const numB = parseInt(bVal);
                    return sortState.direction === 'asc' ? numA - numB : numB - numA;
                }

                return sortState.direction === 'asc' 
                    ? aVal.localeCompare(bVal) 
                    : bVal.localeCompare(aVal);
            });

            indicator.textContent = sortState.direction === 'asc' ? '▽' : '△';
            
            tbody.innerHTML = '';
            rows.forEach(row => tbody.appendChild(row));
            updateRowNumbers();
        }

        function updateRowNumbers() {
            const rows = document.querySelectorAll('#tableBody tr');
            rows.forEach((row, index) => {
                row.cells[0].textContent = index + 1;
            });
        }

        loadData();
    </script>
</body>
</html>
