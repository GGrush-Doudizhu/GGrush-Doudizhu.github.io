<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据统计</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #27ae60;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f8f9fa;
        }

        .container {
            max-width: 1200px;
            margin: 20px auto;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            padding: 2rem;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 2rem;
        }

        .back-nav a {
            color: var(--primary-color);
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .back-nav a:hover {
            background: #f1f3f5;
        }

        .table-wrapper {
            overflow-x: auto;
            margin: 2rem 0;
            border-radius: 8px;
            border: 1px solid #dee2e6;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 800px;
        }

        th {
            background: var(--primary-color);
            color: white;
            padding: 1rem;
            font-weight: 500;
            text-align: left;
            position: relative;
            cursor: pointer;
            transition: background 0.2s;
        }

        th.sortable:hover {
            background: #34495e;
        }

        th.sortable::after {
            content: '';
            position: absolute;
            right: 1rem;
            top: 50%;
            border: 0.4rem solid transparent;
            opacity: 0.6;
        }

        th.sortable.asc::after {
            border-bottom-color: white;
            margin-top: -0.3rem;
        }

        th.sortable.desc::after {
            border-top-color: white;
            margin-top: 0.3rem;
        }

        td {
            padding: 1rem;
            border-top: 1px solid #dee2e6;
        }

        tr:nth-child(even) {
            background: #f8f9fa;
        }

        .loading-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255,255,255,0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            font-size: 1.2rem;
            z-index: 1000;
        }

        .spinner {
            width: 2rem;
            height: 2rem;
            border: 3px solid #ddd;
            border-top-color: var(--accent-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-banner {
            background: #f8d7da;
            color: #721c24;
            padding: 1rem;
            border-radius: 8px;
            margin: 1rem 0;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>
    <div class="container">
        <div class="header">
            <nav class="back-nav">
                <a href="javascript:history.back()">← 返回</a>
                <a href="game_stats_index.html">主目录</a>
                <a href="index.html">主页</a>
            </nav>
            <h1 id="pageTitle">数据加载中...</h1>
        </div>

        <div class="loading-overlay">
            <div class="spinner"></div>
            <span>正在加载数据...</span>
        </div>

        <div id="tablesContainer"></div>
    </div>

<script>
document.addEventListener('DOMContentLoaded', async () => {
    const { searchParams } = new URL(window.location.href);
    const loader = document.querySelector('.loading-overlay');
    const container = document.getElementById('tablesContainer');
    
    try {
        // 参数解析
        const sheetIndices = (searchParams.get('sheets') || '')
            .split(',')
            .map(s => parseInt(s.trim()))
            .filter(n => !isNaN(n));
        
        const title = searchParams.get('title') || '游戏数据统计';
        document.title = title + ' | GGrush';
        document.getElementById('pageTitle').textContent = title;

        if (!sheetIndices.length) throw new Error('缺少工作表参数');

        // 加载Excel数据
        const excelFile = await fetch('data/data.xlsx');
        if (!excelFile.ok) throw new Error(`文件加载失败 (${excelFile.status})`);
        const buffer = await excelFile.arrayBuffer();
        const workbook = XLSX.read(buffer, { type: 'array' });

        // 验证工作表索引
        const validSheets = sheetIndices
            .filter(i => i >= 0 && i < workbook.SheetNames.length)
            .map(i => ({
                index: i,
                name: workbook.SheetNames[i],
                data: XLSX.utils.sheet_to_json(workbook.Sheets[workbook.SheetNames[i]], {
                    header: 1,
                    defval: '',
                    range: 0
                })
            }));
        
        if (!validSheets.length) throw new Error('没有有效的工作表');

        // 渲染表格
        validSheets.forEach((sheet, tableIndex) => {
            if (sheet.data.length < 3) {
                const errorEl = document.createElement('div');
                errorEl.className = 'error-banner';
                errorEl.textContent = `工作表 "${sheet.name}" 数据不完整`;
                container.appendChild(errorEl);
                return;
            }

            // 提取表头和数据
            const [titleRow, headerRow, ...dataRows] = sheet.data;
            const tableId = `table-${tableIndex}`;
            
            // 创建表格结构
            const wrapper = document.createElement('div');
            wrapper.className = 'table-wrapper';
            wrapper.innerHTML = `
                <h3>${titleRow[0] || sheet.name}</h3>
                <table id="${tableId}">
                    <thead>
                        <tr>${headerRow.slice(0,6).map(h => 
                            `<th class="${isSortable(h) ? 'sortable' : ''}">${h}</th>`
                        ).join('')}</tr>
                    </thead>
                    <tbody></tbody>
                </table>
            `;
            container.appendChild(wrapper);

            // 初始化排序
            const initialSortKey = '胜场数';
            const sortConfig = {
                key: initialSortKey,
                index: headerRow.indexOf(initialSortKey),
                asc: false
            };
            
            // 绑定排序事件
            wrapper.querySelectorAll('th.sortable').forEach(th => {
                th.addEventListener('click', () => handleSort(th, tableId));
            });

            // 渲染数据
            updateTable(tableId, dataRows, headerRow, sortConfig);
        });

    } catch (error) {
        const errorEl = document.createElement('div');
        errorEl.className = 'error-banner';
        errorEl.innerHTML = `
            <strong>加载失败：</strong>${error.message}<br>
            <small>${error.stack || ''}</small>
        `;
        container.prepend(errorEl);
    } finally {
        loader.remove();
    }

    function isSortable(header) {
        return ['胜场数', '负场数', '总场数', '胜率'].includes(header);
    }

    function parseValue(value, header) {
        if (header === '胜率') {
            const num = typeof value === 'string' 
                ? parseFloat(value.replace('%', '')) / 100
                : Number(value);
            return isNaN(num) ? 0 : num;
        }
        return typeof value === 'number' ? value : String(value).trim();
    }

    function updateTable(tableId, rows, headers, sortConfig) {
        const table = document.getElementById(tableId);
        const tbody = table.querySelector('tbody');
        const sortIndex = headers.indexOf(sortConfig.key);
        
        // 排序逻辑
        const sorted = [...rows].sort((a, b) => {
            const valA = parseValue(a[sortIndex], sortConfig.key);
            const valB = parseValue(b[sortIndex], sortConfig.key);
            return (valA < valB ? -1 : 1) * (sortConfig.asc ? 1 : -1);
        });

        // 渲染数据
        tbody.innerHTML = sorted.map(row => `
            <tr>${row.slice(0,6).map((cell, i) => `
                <td>${formatCell(cell, headers[i])}</td>
            `).join('')}</tr>
        `).join('');

        // 更新排序指示
        table.querySelectorAll('th').forEach(th => {
            th.classList.remove('asc', 'desc');
            if (th.textContent === sortConfig.key) {
                th.classList.add(sortConfig.asc ? 'asc' : 'desc');
            }
        });
    }

    function formatCell(value, header) {
        if (header === '胜率') {
            const num = parseFloat(value) * 100;
            return !isNaN(num) ? num.toFixed(2) + '%' : 'N/A';
        }
        return value || '';
    }

    function handleSort(th, tableId) {
        const table = document.getElementById(tableId);
        const headers = [...table.querySelectorAll('th')].map(th => th.textContent);
        const currentKey = th.textContent;
        const currentSort = th.classList.contains('asc') ? 'asc' : 'desc';
        
        updateTable(tableId, 
            [...table.querySelectorAll('tbody tr')].map(tr => 
                [...tr.children].map(td => td.textContent)
            ), 
            headers,
            {
                key: currentKey,
                index: headers.indexOf(currentKey),
                asc: currentSort === 'desc'
            }
        );
    }
});
</script>
</body>
</html>
