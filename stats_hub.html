<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据统计中心 | GGrush 星际斗地主</title>
    <style>
        :root {
            --primary-color: #2A2A2A;
            --accent-color: #FF6B6B;
            --gradient-bg: linear-gradient(135deg, #2A2A2A 0%, #1A1A1A 100%);
            --text-light: #F8F9FA;
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            background: #f8f9fa;
            color: #444;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--gradient-bg);
            color: var(--text-light);
            /* 调整内边距和主页区分开 */
            padding: 2.5rem 1rem; 
            text-align: center;
            box-shadow: var(--shadow-sm);
            position: relative;
            overflow: hidden;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: -50px;
            left: -10%;
            right: -10%;
            height: 100px;
            background: #fff;
            transform: rotate(-3deg);
            z-index: 1;
        }
        
        /* 导航按钮样式 (与index.html一致，用于本页的5个数据按钮) */
        /* 注意：这里用了一个新的ID #statsNav 来区分可能存在的全局nav */
        #statsNav {
            margin: 2rem auto;
            max-width: 900px; /* 保持一致 */
            width: 90%;
        }

        #statsNav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            /* 调整列数，这里5个按钮，可以一行2-3个，或者让auto-fit处理 */
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
            gap: 1rem;
            justify-content: center;
        }

        #statsNav li {
            text-align: center;
        }

        #statsNav a {
            display: inline-block;
            padding: 1rem 2rem;
            background: white;
            color: var(--primary-color);
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 3px 15px rgba(0,0,0,0.1);
            border: 2px solid transparent;
        }

        #statsNav a:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
            background: var(--accent-color);
            color: white;
        }

        .container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 2.5rem;
            background: white;
            border-radius: 15px;
            box-shadow: var(--shadow-sm);
            position: relative;
            z-index: 2;
            animation: fadeIn 0.6s ease-out;
        }

        /* 调整 h1 字体大小，使其不那么像主页标题 */
        h1 {
            font-size: 2.2rem; 
            margin-bottom: 0.8rem;
            letter-spacing: -0.5px;
            animation: slideDown 0.8s ease;
        }

        h2 {
            color: var(--accent-color);
            border-bottom: 3px solid var(--accent-color);
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
            text-align: center; /* 让标题居中更美观 */
        }

        footer {
            margin-top: auto;
            background: var(--primary-color);
            color: var(--text-light);
            padding: 2rem;
            text-align: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 返回主页按钮的CSS */
        .back-link {
            display: inline-flex; /* 使用inline-flex让箭头和文字在同一行并垂直居中 */
            align-items: center;
            padding: 0.8rem 1.5rem;
            background: var(--primary-color); /* 使用CSS变量保持一致 */
            color: white;
            border-radius: 30px;
            text-decoration: none;
            transition: all 0.3s ease;
            margin-bottom: 1.5rem; /* 和h2的margin-bottom一致，视觉上对齐 */
            font-weight: 600;
        }

        .back-link:hover {
            background: #3a3a3a; /* 一个略微变亮的颜色 */
            transform: translateX(-5px); /* 左移效果 */
        }
        
        .button-container { /* 用于包裹返回按钮，方便布局 */
            margin-bottom: 1.5rem;
            text-align: left; /* 或者 center, right 根据需要 */
        }


        @media (max-width: 768px) {
            #statsNav ul {
                grid-template-columns: 1fr; /* 移动端每行一个按钮 */
            }
            
            .container {
                padding: 1.5rem;
                margin: 1rem;
            }
            
            h1 {
                font-size: 1.8rem; /* 移动端标题再小一点 */
            }
            .back-link {
                width: calc(100% - 3rem); /* 让返回按钮在移动端也好看些，减去padding */
                justify-content: center;
                box-sizing: border-box;
            }
            .button-container {
                text-align: center; /* 移动端返回按钮居中 */
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>数据统计中心</h1>
        <p>选择您想深入了解的数据报告</p>
    </header>

    <div class="container">
        <div class="button-container">
            <a href="index.html" class="back-link">← 返回主页</a>
        </div>

        <h2>选择数据报告</h2>
        
        <nav id="statsNav">
            <ul>
                <li><a href="summary_all_roles.html">📊 总览数据 (All Roles)</a></li>
                <li><a href="summary_landlord.html">👑 地主数据 (Landlord)</a></li>
                <li><a href="summary_farmer.html">🧑‍🌾 农民数据 (Farmer)</a></li>
                <li><a href="summary_rich_farmer.html">💰 富农数据 (Rich Farmer)</a></li>
                <li><a href="summary_poor_farmer.html">😥 贫农数据 (Poor Farmer)</a></li>
            </ul>
        </nav>
        
        <p style="text-align: center; margin-top: 2rem;">请点击上方任一按钮查看详细的统计数据分析。</p>
    </div>

    <footer>
        <div class="wechat-contact">
            📱 加入社区：加微信scdoudizhu进群
        </div>
        <p>© <span id="currentYear"></span> 斗地主作者GGrush. 保留所有权利</p>
    </footer>

    <script>
        // 自动更新年份
        const currentYearEl = document.getElementById('currentYear');
        if (currentYearEl) {
            currentYearEl.textContent = new Date().getFullYear();
        }
    </script>

</body>
</html>
