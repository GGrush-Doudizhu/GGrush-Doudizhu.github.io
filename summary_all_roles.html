<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全角色统计 | 星际斗地主</title>
    <style>
        :root {
            --primary-color: #2A2A2A;
            --accent-color: #FF6B6B;
            --gradient-bg: linear-gradient(135deg, #2A2A2A 0%, #1A1A1A 100%);
            --text-light: #F8F9FA;
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            background: #f8f9fa;
            color: #444;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-size: 16px; /* Base for mobile */
        }

        .main-header {
            background: var(--gradient-bg);
            color: var(--text-light);
            padding: 2rem 1rem; /* Mobile padding */
            text-align: center;
            box-shadow: var(--shadow-sm);
        }
        .main-header h1 {
            font-size: 1.8rem; /* Mobile h1 */
            margin-bottom: 0.3rem;
        }
        .main-header p {
            font-size: 0.9rem; /* Mobile p */
            margin-top: 0.2rem;
        }

        .container {
            /* max-width: 1000px; -- Set in desktop query */
            width: auto; /* Allow it to shrink wrap content or fill based on margin */
            margin: 1rem; /* Mobile margin */
            padding: 1rem; /* Mobile padding */
            background: white;
            border-radius: 10px; /* Mobile border-radius */
            box-shadow: var(--shadow-sm);
            animation: fadeIn 0.6s ease-out;
            /* overflow: hidden; /* If container itself should clip, but table-container handles table overflow */
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            padding: 0.7rem 1.2rem; /* Mobile padding */
            background: var(--primary-color);
            color: white;
            border-radius: 30px;
            text-decoration: none;
            transition: all 0.3s ease;
            margin-bottom: 1rem; /* Mobile margin */
            font-weight: 600;
            font-size: 0.9rem; /* Mobile font size */
        }
        .back-link:hover, .back-link:focus {
            background: #3a3a3a;
            transform: scale(1.03); /* Mobile-friendly hover/focus */
        }

        .stats-card {
            padding: 1rem; /* Mobile padding */
            margin: 1.5rem 0; /* Mobile margin */
            background: rgba(255,255,255,0.95);
            border-radius: 10px; /* Mobile border-radius */
            box-shadow: var(--shadow-md);
            transition: transform 0.3s ease;
        }
        .stats-card:hover {
            transform: translateY(-2px); /* Subtle hover */
        }

        .table-container {
            overflow-x: auto; /* ESSENTIAL for wide tables on mobile */
            -webkit-overflow-scrolling: touch; /* Smooth scrolling on iOS */
            border-radius: 8px;
            margin: 1rem 0;
        }

        table {
            width: 100%; /* Table will try to fit container, but can exceed if content is wider due to nowrap */
            border-collapse: collapse;
            background: white;
            /* min-width: 600px; */ /* Optional: if you want a minimum table width regardless of content */
        }

        .sort-hint {
            color: #666;
            font-size: 0.85rem; /* Mobile font size */
            padding: 0.5rem 0.75rem; /* Mobile padding */
            background: #fff3cd;
            border-radius: 6px;
            display: inline-block;
            margin: 0 0 0.8rem 0; /* Mobile margin */
            border: 1px solid #ffeeba;
            font-style: italic;
        }
        .sort-hint::before {
            content: "💡 ";
            margin-right: 5px;
        }

        th, td {
            padding: 10px 8px; /* Mobile cell padding */
            text-align: left;
            border-bottom: 1px solid #eee;
            font-size: 0.85em; /* Mobile font size in cells */
            white-space: nowrap; /* CRUCIAL: Prevents text wrapping, forces horizontal scroll for wide content */
        }

        th {
            background-color: var(--primary-color);
            color: var(--text-light);
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
            position: sticky; /* Header sticks to top of .table-container during scroll */
            top: 0;
            z-index: 10; /* Ensure header is above table content */
        }
        th:hover {
            background-color: #3a3a3a;
        }

        tr:nth-child(even) { background-color: #f8f9fa; }
        tr:nth-child(odd) { background-color: #ffffff; }
        tr:hover { background-color: #f1f1f1; }

        .sort-indicator {
            display: inline-block;
            margin-left: 8px;
            color: var(--accent-color);
            transition: transform 0.3s ease;
            font-size: 0.8em;
        }

        footer {
            margin-top: auto;
            background: var(--primary-color);
            color: var(--text-light);
            padding: 1.5rem 1rem; /* Mobile padding */
            text-align: center;
            line-height: 1.8;
            font-size: 0.85rem; /* Mobile font size */
        }
        .wechat-contact .wechat-id {
            font-weight: bold;
            color: var(--accent-color);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); } /* Mobile adjusted */
            to { opacity: 1; transform: translateY(0); }
        }

        /* Data highlighting - column indices are 1-based */
        td:nth-child(3) { color: #28a745; font-weight: 500; } /* 胜场 (序号, 选手, 胜场) */
        td:nth-child(4) { color: #dc3545; font-weight: 500; } /* 负场 */
        td:nth-child(6) { font-weight: 600; color: var(--accent-color); } /* 胜率 */

        /* --- Desktop Styles (Tablet and Desktop) --- */
        @media (min-width: 768px) {
            body {
                font-size: 17px; /* Desktop base font size */
            }

            .main-header {
                padding: 3rem 1rem; /* Desktop padding */
            }
            .main-header h1 { font-size: 2.2rem; }
            .main-header p { font-size: 1rem; }

            .container {
                max-width: 1000px; /* Max width for desktop */
                margin: 2rem auto; /* Center on desktop */
                padding: 2rem; /* Desktop padding */
                border-radius: 15px;
            }

            .back-link {
                padding: 0.8rem 1.5rem; /* Desktop padding */
                font-size: 1rem; /* Desktop font size */
                margin-bottom: 1.5rem;
            }
            .back-link:hover, .back-link:focus {
                transform: translateX(-5px); /* Desktop hover */
            }

            .stats-card {
                padding: 1.5rem; /* Desktop padding */
                margin: 2rem 0; /* Desktop margin */
                border-radius: 12px;
            }
            .stats-card:hover {
                transform: translateY(-3px); /* Desktop hover */
            }

            .sort-hint {
                font-size: 0.9em;
                padding: 8px 12px;
                margin-bottom: 1rem;
            }

            th, td {
                padding: 14px 16px; /* Desktop cell padding */
                font-size: 0.9em; /* Relative to body font, or use 1rem */
                /* white-space: nowrap; */ /* Kept from mobile, table might still be wide */
            }
            
            /* If you want to allow text wrapping on desktop and the table is not excessively wide: */
            /*
            th, td {
                white-space: normal;
            }
            */

            footer {
                padding: 2rem; /* Desktop padding */
                font-size: 0.9rem; /* Desktop font size */
            }
        }
    </style>
</head>
<body>

    <header class="main-header">
        <h1>📊 全角色排行榜</h1>
        <p>DSL 第一赛季数据</p>
    </header>

    <div class="container">
        <a href="stats_hub.html" class="back-link">← 返回数据中心</a> <!-- Changed link to stats_hub.html -->

        <div class="stats-card">
            <div class="table-container">
                <p class="sort-hint">点击列表头可按该列升序或降序排列。</p>
                <table id="statsTable">
                    <thead>
                        <tr>
                            <th>序号</th>
                            <th>选手 <span class="sort-indicator"></span></th>
                            <th>胜场数 <span class="sort-indicator"></span></th>
                            <th>负场数 <span class="sort-indicator"></span></th>
                            <th>总场数 <span class="sort-indicator"></span></th>
                            <th>胜率 <span class="sort-indicator"></span></th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <!-- Data rows will be dynamically populated by JavaScript -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <footer>
        <div class="wechat-contact">
            📱 加入社区：加微信 <span class="wechat-id">scdou</span><span class="wechat-id">dizhu</span> 进群
        </div>
        <p>Copyright © <span id="yearRange"></span> 斗地主作者GGrush 保留所有权利</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            // --- Configuration ---
            const CSV_FILE_PATH = 'data/summary_all_roles.csv';
            const TABLE_BODY_ID = 'tableBody';
            const TABLE_HEADERS_SELECTOR = '#statsTable th';

            // --- DOM Elements ---
            const tableBody = document.getElementById(TABLE_BODY_ID);
            const tableHeaders = document.querySelectorAll(TABLE_HEADERS_SELECTOR);

            // --- State Variables ---
            let currentSort = {
                columnDataIndex: null, // Index for data properties (0: player, 1: wins, ...)
                direction: 'desc'    // 'asc' or 'desc'
            };
            let rawData = []; // Stores original parsed data

            // --- Initialization ---
            function initialize() {
                updateCopyrightYear();
                loadAndProcessData();
                setupEventListeners();
            }

            function updateCopyrightYear() {
                const startYear = 2025;
                const currentYear = new Date().getFullYear();
                const yearRangeEl = document.getElementById('yearRange');

                if (yearRangeEl) {
                    yearRangeEl.textContent =
                        startYear === currentYear ? startYear.toString() : `${startYear}-${currentYear}`;
                }
            }

            // --- Data Loading and Processing ---
            async function loadAndProcessData() {
                if (!tableBody) {
                    console.error(`Table body with ID '${TABLE_BODY_ID}' not found.`);
                    return;
                }
                try {
                    const response = await fetch(CSV_FILE_PATH);
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status} while fetching ${CSV_FILE_PATH}`);
                    }
                    const csvText = await response.text();
                    parseCSV(csvText);
                    // Initial render (default sort or first column sort if desired)
                    // For now, let's sort by '胜率' (winRate) descending by default
                    currentSort.columnDataIndex = 4; // winRate is the 5th data property (index 4)
                    currentSort.direction = 'desc';
                    renderTable(); 
                } catch (error) {
                    console.error('Failed to load or process data:', error);
                    tableBody.innerHTML = `<tr><td colspan="${tableHeaders.length || 6}" style="text-align:center; color:red;">数据加载失败: ${error.message}</td></tr>`;
                }
            }

            function parseCSV(csvText) {
                const cleanCSV = csvText.replace(/^\uFEFF/, ''); // Remove BOM
                const lines = cleanCSV.split(/\r?\n/).filter(line => line.trim() !== '');

                if (lines.length < 2) {
                    console.warn('CSV file has insufficient content (needs header and at least one data row).');
                    rawData = [];
                    return;
                }

                // const headerFromCSV = lines[0].split(','); // CSV header, useful for validation
                const dataLines = lines.slice(1); // Skip CSV header row

                rawData = dataLines.map(line => {
                    const values = line.split(',');
                    // Expecting: Player, Wins, Losses, TotalGames, WinRate
                    if (values.length === 5) { 
                        return {
                            player: values[0].trim(),
                            wins: parseInt(values[1], 10) || 0,
                            losses: parseInt(values[2], 10) || 0,
                            totalGames: parseInt(values[3], 10) || 0,
                            winRate: parseFloat(values[4]) || 0.0
                        };
                    }
                    console.warn('Skipping malformed CSV line:', line);
                    return null;
                }).filter(item => item !== null); // Filter out nulls from malformed lines
            }

            // --- Rendering ---
            function renderTable() {
                if (!tableBody) return;
                tableBody.innerHTML = ''; // Clear existing content

                if (rawData.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="${tableHeaders.length || 6}" style="text-align:center;">暂无数据</td></tr>`;
                    return;
                }
                
                sortData(); // Apply current sorting to rawData

                rawData.forEach((dataRow, index) => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td>${index + 1}</td>
                        <td>${dataRow.player}</td>
                        <td>${dataRow.wins}</td>
                        <td>${dataRow.losses}</td>
                        <td>${dataRow.totalGames}</td>
                        <td>${dataRow.winRate.toFixed(2)}%</td>
                    `;
                    tableBody.appendChild(tr);
                });
                updateSortIndicators();
            }

            // --- Sorting Logic ---
            function setupEventListeners() {
                tableHeaders.forEach((th, headerIndex) => {
                    // headerIndex from <th>: 0 (序号), 1 (选手), 2 (胜场), ...
                    // dataColumnIndex for actual data: 0 (选手), 1 (胜场), ...
                    const dataColumnIndex = headerIndex - 1; 
                    
                    if (dataColumnIndex >= 0) { // Only actual data columns are sortable
                        th.addEventListener('click', () => handleSort(dataColumnIndex));
                    }
                });
            }
            
            function handleSort(dataColumnIndex) {
                if (currentSort.columnDataIndex === dataColumnIndex) {
                    currentSort.direction = currentSort.direction === 'asc' ? 'desc' : 'asc';
                } else {
                    currentSort.columnDataIndex = dataColumnIndex;
                    currentSort.direction = 'desc'; // Default to descending for a new column
                }
                renderTable(); // Re-sort and re-render
            }

            function sortData() {
                if (currentSort.columnDataIndex === null) return; 

                const dataIndex = currentSort.columnDataIndex;
                const directionMultiplier = currentSort.direction === 'asc' ? 1 : -1;

                const sortKeys = [
                    'player',     // 0: 选手
                    'wins',       // 1: 胜场数
                    'losses',     // 2: 负场数
                    'totalGames', // 3: 总场数
                    'winRate'     // 4: 胜率
                ];
                
                const sortKey = sortKeys[dataIndex];

                rawData.sort((a, b) => {
                    const valA = a[sortKey];
                    const valB = b[sortKey];

                    if (typeof valA === 'string' && typeof valB === 'string') {
                        return valA.localeCompare(valB) * directionMultiplier;
                    } else if (typeof valA === 'number' && typeof valB === 'number') {
                         // For numbers, primary sort by value, secondary sort by totalGames (desc) for ties, then by player name (asc)
                        if (valA !== valB) {
                            return (valA - valB) * directionMultiplier;
                        } else {
                            // Tie-breaking: more games is better for wins/winRate, fewer for losses
                            if (sortKey === 'wins' || sortKey === 'winRate' || sortKey === 'totalGames') {
                                if (b.totalGames !== a.totalGames) {
                                    return (b.totalGames - a.totalGames); // Higher totalGames first
                                }
                            } else if (sortKey === 'losses') {
                                 if (a.totalGames !== b.totalGames) {
                                    return (a.totalGames - b.totalGames); // Lower totalGames first for losses
                                 }
                            }
                            return a.player.localeCompare(b.player); // Final tie-breaker by player name
                        }
                    }
                    return 0;
                });
            }

            function updateSortIndicators() {
                tableHeaders.forEach((th, headerIndex) => {
                    const indicator = th.querySelector('.sort-indicator');
                    if (indicator) {
                        // headerIndex refers to <th>, currentSort.columnDataIndex to data property index
                        if (headerIndex - 1 === currentSort.columnDataIndex) {
                            indicator.textContent = currentSort.direction === 'asc' ? '↑' : '↓';
                        } else {
                            indicator.textContent = ''; // Clear for non-sorted columns
                        }
                    }
                });
            }

            // --- Start ---
            initialize();
        });
    </script>
</body>
</html>
