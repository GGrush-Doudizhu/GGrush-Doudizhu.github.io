<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, maximum-scale=3.0, minimum-scale=0.5">
    <title>最近比赛日战报 | 星际斗地主</title>
    <style>
        :root {
            --primary-color: #2A2A2A;
            --accent-color: #FF6B6B;
            --gradient-bg: linear-gradient(135deg, #2A2A2A 0%, #1A1A1A 100%);
            --text-light: #F8F9FA;
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-md: 0 4px 12px rgba(0,0,0,0.08);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            background: #f8f9fa;
            color: #444;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-size: 16px; /* Base for mobile */
        }

        .main-header {
            background: var(--gradient-bg);
            color: var(--text-light);
            padding: 2rem 1rem; /* Mobile padding */
            text-align: center;
            box-shadow: var(--shadow-sm);
        }
        .main-header h1 {
            font-size: 1.8rem; /* Mobile h1 */
            margin-bottom: 0.3rem;
        }
        .main-header p {
            font-size: 0.9rem; /* Mobile p */
            margin-top: 0.2rem;
        }

        .container {
            width: auto;
            margin: 1rem; /* Mobile margin */
            padding: 1rem; /* Mobile padding */
            background: white;
            border-radius: 10px; /* Mobile border-radius */
            box-shadow: var(--shadow-sm);
            animation: fadeIn 0.6s ease-out;
        }

        .nav-buttons-container {
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column; 
            gap: 0.5rem; 
        }

        .back-link {
            display: inline-flex; 
            align-items: center;
            justify-content: center; 
            padding: 0.7rem 1.2rem; 
            background: var(--primary-color);
            color: white;
            border-radius: 30px;
            text-decoration: none;
            transition: all 0.3s ease;
            font-weight: 600;
            font-size: 0.9rem; 
            text-align: center;
            box-sizing: border-box; 
        }
        .back-link:hover, .back-link:focus {
            background: #3a3a3a;
            transform: scale(1.03);
        }
        .back-link.secondary {
             background: #4a5568; 
        }
        .back-link.secondary:hover, .back-link.secondary:focus {
            background: #2d3748;
        }

        .report-card { /* Changed from stats-card */
            padding: 1rem;
            margin: 1.5rem 0;
            background: rgba(255,255,255,0.95);
            border-radius: 10px;
            box-shadow: var(--shadow-md);
            transition: transform 0.3s ease;
        }
        .report-card:hover {
            transform: translateY(-2px);
        }
        
        .game-block {
            background-color: #f9f9f9; /* Lighter background for game block itself */
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            box-shadow: var(--shadow-sm);
        }

        .game-block h3 {
            margin-top: 0;
            color: var(--primary-color);
            border-bottom: 2px solid var(--accent-color);
            padding-bottom: 8px;
            font-size: 1.2em;
            margin-bottom: 10px;
        }
        
        .game-block pre { /* For general game info */
            white-space: pre-wrap;      
            word-wrap: break-word;      
            font-family: 'Consolas', 'Monaco', 'Menlo', monospace;
            font-size: 0.85em;
            line-height: 1.5;
            background: #fff;
            padding: 10px;
            border-radius: 5px;
            border: 1px solid #ddd;
            margin-bottom: 15px; /* Space before player table */
        }

        .player-info-heading {
            font-weight: bold;
            margin-top: 15px;
            margin-bottom: 5px;
            font-size: 0.9em;
            color: #333;
        }

        .table-container { /* Reusing this from original for consistency */
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border-radius: 8px;
            margin: 1rem 0; /* Applied to player table container */
            width: 100%;
        }

        .player-data-table { /* Specific to player info table */
            width: 100%;
            border-collapse: collapse;
            background: white;
        }

        /* Generic table styles from the reference, applied to .player-data-table */
        .player-data-table th, .player-data-table td {
            padding: 10px 8px;
            text-align: left;
            border-bottom: 1px solid #eee;
            font-size: 0.85em;
            white-space: nowrap; /* Keeps content on one line, relies on .table-container scroll */
        }

        .player-data-table th {
            background-color: var(--primary-color);
            color: var(--text-light);
            font-weight: 600;
            /* position: sticky; top: 0; z-index: 5; */ /* Sticky might be too much for small tables */
        }

        .player-data-table tr:nth-child(even) { background-color: #f8f9fa; }
        .player-data-table tr:nth-child(odd) { background-color: #ffffff; }
        /* .player-data-table tr:hover { background-color: #f1f1f1; } */


        footer {
            margin-top: auto;
            background: var(--primary-color);
            color: var(--text-light);
            padding: 1.5rem 1rem;
            text-align: center;
            line-height: 1.8;
            font-size: 0.85rem;
        }
        .wechat-contact .wechat-id {
            font-weight: bold;
            color: var(--accent-color);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (min-width: 768px) {
            body {
                font-size: 17px;
            }
            .main-header { padding: 3rem 1rem; }
            .main-header h1 { font-size: 2.2rem; }
            .main-header p { font-size: 1rem; }

            .container {
                max-width: 1000px;
                margin: 2rem auto;
                padding: 2rem;
                border-radius: 15px;
            }
            .nav-buttons-container {
                flex-direction: row; 
                justify-content: flex-start; 
                align-items: center;
                gap: 1rem; 
            }
            .back-link {
                padding: 0.8rem 1.5rem;
                font-size: 1rem;
                width: auto; 
            }
            .back-link:hover, .back-link:focus { transform: translateX(-5px); }

            .report-card {
                padding: 1.5rem;
                margin: 2rem 0;
                border-radius: 12px;
            }
            .report-card:hover { transform: translateY(-3px); }
            
            .game-block h3 { font-size: 1.3em; }
            .game-block pre { font-size: 0.9em; }
            .player-info-heading { font-size: 1em; }
            .player-data-table th, .player-data-table td {
                padding: 14px 16px;
                font-size: 0.9em;
            }
            footer { padding: 2rem; font-size: 0.9rem; }
        }
    </style>
</head>
<body>

    <header class="main-header">
        <h1>📜 最近比赛日战报</h1>
        <p>20250515，open, mosuo, 嘴哥恩怨局，暨随机角色和队友地图首测</p>
    </header>

    <div class="container">
        <div class="nav-buttons-container">
            <a href="index" class="back-link">返回主页</a>
            <a href="stats" class="back-link secondary">返回上页： 数据导航</a>
        </div>

        <div class="report-card" id="reportDataContainer">
            <!-- Game data will be dynamically populated by JavaScript -->
        </div>
    </div>

    <footer>
        <div class="wechat-contact">
            📱 加入社区：加微信 <span class="wechat-id">scdou</span><span class="wechat-id">dizhu</span> 进群
        </div>
        <p>Copyright © <span id="yearRange"></span> 斗地主作者GGrush 保留所有权利</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const CSV_FILE_PATH = 'data/last-matchday.csv';
            const REPORT_DATA_CONTAINER_ID = 'reportDataContainer';
            const reportDataContainer = document.getElementById(REPORT_DATA_CONTAINER_ID);

            function updateCopyrightYear() {
                const startYear = 2025;
                const currentYear = new Date().getFullYear();
                const yearRangeEl = document.getElementById('yearRange');
                if (yearRangeEl) {
                    yearRangeEl.textContent = startYear === currentYear ? startYear.toString() : `${startYear}-${currentYear}`;
                }
            }

            // Helper function to parse a simple CSV line (no quotes with commas)
            function simpleCsvSplit(line) {
                return line.split(',').map(s => s.trim());
            }

            async function loadAndDisplayReportData() {
                if (!reportDataContainer) {
                    console.error(`Data container with ID '${REPORT_DATA_CONTAINER_ID}' not found.`);
                    return;
                }
                try {
                    const response = await fetch(CSV_FILE_PATH);
                    if (!response.ok) throw new Error(`HTTP error! status: ${response.status} fetching ${CSV_FILE_PATH}`);
                    
                    const csvText = await response.text();
                    const gameBlocksText = csvText.trim().split(/\n?(?=^Game ID,)/m);

                    if (gameBlocksText.length === 0 || (gameBlocksText.length === 1 && gameBlocksText[0].trim() === '')) {
                        reportDataContainer.innerHTML = '<p style="text-align:center;">没有找到比赛数据或文件为空。</p>';
                        return;
                    }
                    
                    reportDataContainer.innerHTML = ''; // Clear previous content

                    gameBlocksText.forEach((blockText, index) => {
                        const trimmedBlockText = blockText.trim();
                        if (trimmedBlockText === '') return;

                        const gameDiv = document.createElement('div');
                        gameDiv.className = 'game-block';

                        const lines = trimmedBlockText.split('\n');
                        let generalInfoContent = [];
                        let playerInfoLines = [];
                        let isPlayerInfoSection = false;

                        // Extract Game ID for H3 title
                        const gameIdLine = lines.find(line => line.startsWith("Game ID,"));
                        const h3 = document.createElement('h3');
                        if (gameIdLine) {
                            const gameIdMatch = gameIdLine.match(/^Game ID,(\s*\d+)/);
                            h3.textContent = gameIdMatch ? `比赛记录 (ID: ${gameIdMatch[1].trim()})` : `比赛记录 ${index + 1}`;
                        } else {
                            h3.textContent = `比赛记录 ${index + 1}`;
                        }
                        gameDiv.appendChild(h3);

                        // Separate general info from player info
                        for (const line of lines) {
                            const trimmedLine = line.trim();
                            if (trimmedLine.startsWith("Game ID,")) continue; // Already handled

                            if (trimmedLine.startsWith("Player Info:")) {
                                isPlayerInfoSection = true;
                                // Add "Player Info:" heading above the table
                                const playerInfoTitle = document.createElement('p');
                                playerInfoTitle.className = 'player-info-heading';
                                playerInfoTitle.textContent = '选手信息:';
                                gameDiv.appendChild(playerInfoTitle);
                                continue; // Don't add this line to playerInfoLines or generalInfoContent
                            }

                            if (isPlayerInfoSection) {
                                if (trimmedLine) playerInfoLines.push(trimmedLine);
                            } else {
                                if (trimmedLine) generalInfoContent.push(trimmedLine);
                            }
                        }

                        // Display general game info using <pre>
                        if (generalInfoContent.length > 0) {
                            const preGeneral = document.createElement('pre');
                            preGeneral.textContent = generalInfoContent.join('\n');
                            gameDiv.appendChild(preGeneral);
                        }

                        // Display player info as a table
                        if (playerInfoLines.length > 0) {
                            const tableContainerDiv = document.createElement('div');
                            tableContainerDiv.className = 'table-container';

                            const table = document.createElement('table');
                            table.className = 'player-data-table';

                            // Table Header
                            const headerData = simpleCsvSplit(playerInfoLines[0]);
                            const thead = document.createElement('thead');
                            const trHead = document.createElement('tr');
                            headerData.forEach(headerText => {
                                const th = document.createElement('th');
                                th.textContent = headerText;
                                trHead.appendChild(th);
                            });
                            thead.appendChild(trHead);
                            table.appendChild(thead);

                            // Table Body
                            const tbody = document.createElement('tbody');
                            for (let i = 1; i < playerInfoLines.length; i++) {
                                const rowData = simpleCsvSplit(playerInfoLines[i]);
                                const trBody = document.createElement('tr');
                                rowData.forEach(cellText => {
                                    const td = document.createElement('td');
                                    // Handle potential quotes in File Name (though unlikely in player data lines)
                                    // For player data, it's usually simpler like 'Name,Result,Role,Race'
                                    td.textContent = cellText.replace(/^"|"$/g, ''); // Basic quote removal
                                    trBody.appendChild(td);
                                });
                                tbody.appendChild(trBody);
                            }
                            table.appendChild(tbody);
                            tableContainerDiv.appendChild(table);
                            gameDiv.appendChild(tableContainerDiv);
                        }
                        reportDataContainer.appendChild(gameDiv);
                    });

                } catch (error) {
                    console.error('Failed to load or process report data:', error);
                    reportDataContainer.innerHTML = `<p style="text-align:center; color:red;">数据加载失败: ${error.message}</p>`;
                }
            }

            function initialize() {
                updateCopyrightYear();
                loadAndDisplayReportData();
            }

            initialize();
        });
    </script>
</body>
</html>
