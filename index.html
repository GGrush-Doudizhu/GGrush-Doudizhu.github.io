<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GGrush | 星际斗地主</title>
    <style>
        :root {
            --primary-color: #2A2A2A;
            --accent-color: #FF6B6B;
            --gradient-bg: linear-gradient(135deg, #2A2A2A 0%, #1A1A1A 100%);
            --text-light: #F8F9FA;
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            background: #f8f9fa;
            color: #444;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            font-size: 16px; /* 设定一个基础字体大小，方便rem单位计算 */
        }

        header {
            background: var(--gradient-bg);
            color: var(--text-light);
            padding: 2.5rem 1rem; /* 手机端默认padding */
            text-align: center;
            box-shadow: var(--shadow-sm);
            position: relative;
            overflow: hidden;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: -30px; /* 手机端调整 */
            left: -10%;
            right: -10%;
            height: 60px;  /* 手机端调整 */
            background: #fff;
            transform: rotate(-3deg);
            z-index: 1;
        }

        nav {
            margin: 1.5rem auto; /* 手机端默认margin */
            max-width: 900px;
            width: 95%; /* 手机端更宽一些 */
        }

        nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            grid-template-columns: 1fr; /* 手机端默认单列 */
            gap: 0.8rem; /* 手机端间距 */
            justify-content: center;
        }

        nav li {
            text-align: center;
        }

        nav a {
            display: block; /* 手机端按钮通常占满一行 */
            padding: 0.8rem 1rem; /* 手机端按钮padding */
            background: white;
            color: var(--primary-color);
            text-decoration: none;
            border-radius: 30px; /* 手机端圆角可以小一点 */
            font-weight: 600;
            font-size: 0.95rem; /* 手机端字体大小 */
            transition: all 0.3s ease;
            box-shadow: 0 3px 10px rgba(0,0,0,0.08);
            border: 2px solid transparent;
        }

        nav a:hover, nav a:focus { /* 添加:focus以增强可访问性 */
            transform: translateY(-2px); /* 手机端悬浮效果可以不那么明显 */
            box-shadow: 0 4px 15px rgba(0,0,0,0.12);
            background: var(--accent-color);
            color: white;
        }

        .container {
            max-width: 900px;
            margin: 1rem; /* 手机端默认margin */
            padding: 1.5rem; /* 手机端默认padding */
            background: white;
            border-radius: 10px; /* 手机端圆角 */
            box-shadow: var(--shadow-sm);
            position: relative;
            z-index: 2;
            animation: fadeIn 0.6s ease-out;
        }

        h1 {
            font-size: 2rem; /* 手机端默认字体大小 */
            margin-bottom: 0.8rem;
            letter-spacing: -0.5px;
            animation: slideDown 0.8s ease;
        }
        
        header p { /* 给header里的p也设置一下字体大小 */
            font-size: 0.9rem;
            margin-top: 0.5rem;
        }

        h2 {
            color: var(--accent-color);
            border-bottom: 2px solid var(--accent-color); /* 手机端边框细一点 */
            padding-bottom: 0.4rem;
            margin-top: 1rem;
            margin-bottom: 1rem;
            font-size: 1.5rem; /* 手机端H2大小 */
        }

        .container p, .container ul li { /* 调整正文和列表项字体大小 */
            font-size: 0.95rem;
        }

        .container ul {
            padding-left: 20px; /* 调整列表缩进 */
        }


        footer {
            margin-top: auto;
            background: var(--primary-color);
            color: var(--text-light);
            padding: 1.5rem 1rem; /* 手机端padding */
            text-align: center;
            font-size: 0.85rem; /* 手机端页脚字体 */
        }
        
        .wechat-contact .wechat-id {
            font-weight: bold;
            color: var(--accent-color); /* 让微信号更突出 */
        }


        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- 桌面端样式 (Tablet and Desktop) --- */
        @media (min-width: 768px) {
            body {
                font-size: 17px; /* 桌面端可以稍大一点的基础字体 */
            }

            header {
                padding: 4rem 1rem; /* 恢复桌面端padding */
            }

            header::after {
                bottom: -50px; /* 恢复桌面端设计 */
                height: 100px;
            }

            nav {
                margin: 2rem auto; /* 恢复桌面端margin */
                width: 90%;
            }
            
            nav ul {
                grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); /* 桌面端多列 */
                gap: 1rem; /* 桌面端间距 */
            }

            nav a {
                display: inline-block; /* 桌面端按钮不必占满一行 */
                padding: 1rem 2rem; /* 恢复桌面端按钮padding */
                border-radius: 50px;
                font-size: 1rem; /* 恢复桌面端字体大小 */
                box-shadow: 0 3px 15px rgba(0,0,0,0.1);
            }
            
            nav a:hover, nav a:focus {
                 transform: translateY(-3px);
                 box-shadow: 0 5px 20px rgba(0,0,0,0.15);
            }

            .container {
                margin: 2rem auto; /* 恢复桌面端margin */
                padding: 2.5rem; /* 恢复桌面端padding */
                border-radius: 15px;
            }
            
            h1 {
                font-size: 2.8rem; /* 恢复桌面端字体大小 */
                margin-bottom: 1rem;
                letter-spacing: -1px;
            }

            header p {
                font-size: 1rem; /* 桌面端header p字体大小 */
            }

            h2 {
                border-bottom-width: 3px; /* 恢复桌面端边框粗细 */
                padding-bottom: 0.5rem;
                margin-bottom: 1.5rem;
                font-size: 1.8rem; /* 桌面端H2大小 */
            }

            .container p, .container ul li {
                font-size: 1rem; /* 恢复桌面端正文和列表项字体大小 */
            }

            footer {
                padding: 2rem; /* 恢复桌面端padding */
                font-size: 0.9rem; /* 恢复桌面端页脚字体 */
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>星际斗地主DSL联赛</h1>
        <p>Doudizhu Starcraft League</p>
    </header>

    <nav>
        <ul>
            <!-- 修改这里的链接指向新的统计中心页面 -->
            <li><a href="stats_hub.html">🎮 数据统计</a></li>
            <li><a href="maps.html">🗺️ 地图下载</a></li>
        </ul>
    </nav>

    <div class="container">
        <h2>欢迎来到星际斗地主之家</h2>
        <p>这里是星际斗地主DSL联赛的专属空间，致力于为玩家提供最专业的赛事数据和资源支持。我们提供：</p>
        <ul>
            <li>📊 实时更新的选手对战数据</li>
            <li>🆕 最新比赛地图下载</li>
            <li>💬 玩家社区（加微信scdoudizhu进群）</li>
        </ul>
        <p>点击上方导航菜单开始探索，如有任何建议欢迎通过微信联系我们！</p>
    </div>

    <footer>
        <div class="wechat-contact">
            📱 加入社区：加微信 <span class="wechat-id">scdou</span><span class="wechat-id">dizhu</span> 进群
        </div>
        <p>Copyright © <span id="yearRange"></span> 斗地主作者GGrush 保留所有权利</p>
    </footer>

    <script>
        // 自动更新年份
        const startYear = 2025;
        const currentYear = new Date().getFullYear();
        const yearRangeEl = document.getElementById('yearRange');
        
        if (yearRangeEl) {
            yearRangeEl.textContent = 
                startYear === currentYear ? startYear.toString() : `${startYear}-${currentYear}`;
        }
    </script>

</body>
</html>
