<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>游戏比赛统计</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
            color: #333;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        table {
            width: 80%;
            margin: 20px auto;
            border-collapse: collapse;
            box-shadow: 0 2px 15px rgba(0,0,0,0.1);
            background-color: white;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 12px;
            text-align: left;
        }
        th {
            background-color: #4CAF50;
            color: white;
            text-transform: uppercase;
        }
        tr:nth-child(even) {
            background-color: #f9f9f9;
        }
        tr:hover {
            background-color: #f1f1f1;
        }
        #loadingMessage {
            text-align: center;
            font-size: 1.2em;
            padding: 20px;
        }
    </style>
    <!-- 引入 SheetJS 库 (js-xlsx) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
</head>
<body>

    <h1>游戏比赛统计数据</h1>

    <div id="loadingMessage">正在加载数据，请稍候...</div>

    <table id="dataTable">
        <thead>
            <tr id="tableHeader">
                <!-- 表头将由JavaScript动态生成 -->
            </tr>
        </thead>
        <tbody id="tableBody">
            <!-- 数据行将由JavaScript动态生成 -->
        </tbody>
    </table>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const excelFilePath = 'data/data.xlsx'; 
            
            const loadingMessageDiv = document.getElementById('loadingMessage');
            const dataTable = document.getElementById('dataTable');
            const tableHeader = document.getElementById('tableHeader');
            const tableBody = document.getElementById('tableBody');

            fetch(excelFilePath)
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`无法加载Excel文件: ${response.statusText} (状态码: ${response.status})`);
                    }
                    return response.arrayBuffer(); 
                })
                .then(arrayBuffer => {
                    const workbook = XLSX.read(arrayBuffer, { type: 'array' });

                    const firstSheetName = workbook.SheetNames[0];
                    const worksheet = workbook.Sheets[firstSheetName];

                    const jsonData = XLSX.utils.sheet_to_json(worksheet, { header: 1, defval: "" });

                    if (jsonData.length === 0) {
                        loadingMessageDiv.textContent = 'Excel 文件为空或无法解析。';
                        dataTable.style.display = 'none';
                        return;
                    }

                    const headers = jsonData[0].slice(0, 4); 
                    headers.forEach(headerText => {
                        const th = document.createElement('th');
                        th.textContent = headerText;
                        tableHeader.appendChild(th);
                    });

                    for (let i = 1; i < jsonData.length; i++) {
                        const rowData = jsonData[i].slice(0, 4); 
                        
                        if (rowData.length === 0 || (rowData[0] === "" && rowData.every(cell => cell === ""))) {
                            continue;
                        }

                        const tr = document.createElement('tr');
                        rowData.forEach((cellData, cellIndex) => {
                            const td = document.createElement('td');
                            
                            if (cellIndex === 3 && typeof cellData === 'number' && cellData > 25569) { 
                                const dateObj = XLSX.SSF.parse_date_code(cellData);
                                if (dateObj) {
                                    const year = dateObj.y;
                                    const month = String(dateObj.m).padStart(2, '0');
                                    const day = String(dateObj.d).padStart(2, '0');
                                    const hours = String(dateObj.H).padStart(2, '0');
                                    const minutes = String(dateObj.M).padStart(2, '0');
                                    const seconds = String(dateObj.S).padStart(2, '0');
                                    td.textContent = `${year}-${month}-${day} ${hours}:${minutes}:${seconds}`;
                                } else {
                                    td.textContent = cellData; 
                                }
                            } else {
                                td.textContent = cellData;
                            }
                            tr.appendChild(td);
                        });
                        tableBody.appendChild(tr);
                    }

                    loadingMessageDiv.style.display = 'none'; 
                    dataTable.style.display = 'table'; 

                })
                .catch(error => {
                    console.error('加载或解析Excel数据时出错:', error);
                    loadingMessageDiv.textContent = `加载数据失败: ${error.message}. 请检查文件路径和内容，并查看浏览器控制台获取更多信息。`;
                    dataTable.style.display = 'none';
                });
        });
    </script>

</body>
</html>
