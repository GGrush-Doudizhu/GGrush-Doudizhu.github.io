<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GGrush | 星际斗地主</title>
    <style>
        :root {
            --primary-color: #2A2A2A;
            --accent-color: #FF6B6B;
            --gradient-bg: linear-gradient(135deg, #2A2A2A 0%, #1A1A1A 100%);
            --text-light: #F8F9FA;
            --shadow-sm: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            background: #f8f9fa;
            color: #444;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header {
            background: var(--gradient-bg);
            color: var(--text-light);
            padding: 4rem 1rem;
            text-align: center;
            box-shadow: var(--shadow-sm);
            position: relative;
            overflow: hidden;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: -50px;
            left: -10%;
            right: -10%;
            height: 100px;
            background: #fff;
            transform: rotate(-3deg);
            z-index: 1;
        }

        nav {
            margin: 2rem auto;
            max-width: 900px;
            width: 90%;
        }

        nav ul {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            justify-content: center;
        }

        nav li {
            text-align: center;
        }

        nav a {
            display: inline-block;
            padding: 1rem 2rem;
            background: white;
            color: var(--primary-color);
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s ease;
            box-shadow: 0 3px 15px rgba(0,0,0,0.1);
            border: 2px solid transparent;
        }

        nav a:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(0,0,0,0.15);
            background: var(--accent-color);
            color: white;
        }

        /* Style for the dynamically added sub-buttons, make them slightly smaller */
        nav ul .sub-button a {
            padding: 0.8rem 1.5rem; /* Smaller padding */
            font-size: 0.9em;      /* Smaller font */
            /* You might want to adjust minmax if too many buttons make it too crowded */
        }


        .container {
            max-width: 900px;
            margin: 2rem auto;
            padding: 2.5rem;
            background: white;
            border-radius: 15px;
            box-shadow: var(--shadow-sm);
            position: relative;
            z-index: 2;
            animation: fadeIn 0.6s ease-out;
        }

        h1 {
            font-size: 2.8rem;
            margin-bottom: 1rem;
            letter-spacing: -1px;
            animation: slideDown 0.8s ease;
        }

        h2 {
            color: var(--accent-color);
            border-bottom: 3px solid var(--accent-color);
            padding-bottom: 0.5rem;
            margin-bottom: 1.5rem;
        }

        footer {
            margin-top: auto;
            background: var(--primary-color);
            color: var(--text-light);
            padding: 2rem;
            text-align: center;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            nav ul {
                grid-template-columns: 1fr; /* Keep this for responsiveness */
            }
            nav ul .sub-button a {
                 /* Adjust for mobile if needed */
            }
            
            .container {
                padding: 1.5rem;
                margin: 1rem;
            }
            
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>星际斗地主DSL联赛</h1>
        <p>Doudizhu Starcraft League</p>
    </header>

    <nav>
        <ul id="mainNavUl">
            <!-- 给“数据统计”的链接和其父级li一个ID，方便JS操作 -->
            <li id="dataStatsLi"><a href="game_stats.html" id="dataStatsLink">🎮 数据统计</a></li>
            <li><a href="maps.html">🗺️ 地图下载</a></li>
        </ul>
    </nav>

    <div class="container">
        <h2>欢迎来到星际斗地主之家</h2>
        <p>这里是星际斗地主DSL联赛的专属空间，致力于为玩家提供最专业的赛事数据和资源支持。我们提供：</p>
        <ul>
            <li>📊 实时更新的选手对战数据</li>
            <li>🆕 最新比赛地图下载</li>
            <li>💬 玩家社区（加微信scdoudizhu进群）</li>
        </ul>
        <p>点击上方导航菜单开始探索，如有任何建议欢迎通过微信联系我们！</p>
    </div>

    <footer>
        <div class="wechat-contact">
            📱 加入社区：加微信scdoudizhu进群
        </div>
        <p>© <span id="currentYear"></span> 斗地主作者GGrush. 保留所有权利</p>
    </footer>

    <script>
        // 自动更新年份
        document.getElementById('currentYear').textContent = new Date().getFullYear();

        // 处理“数据统计”按钮点击事件
        const dataStatsLink = document.getElementById('dataStatsLink');
        const dataStatsLi = document.getElementById('dataStatsLi');
        const mainNavUl = document.getElementById('mainNavUl');

        if (dataStatsLink && dataStatsLi && mainNavUl) {
            dataStatsLink.addEventListener('click', function(event) {
                event.preventDefault(); // 阻止默认的链接跳转行为

                // 定义新的按钮数据
                const subButtonsData = [
                    { text: '总览', href: 'summary_all_roles.html', icon: '📊' },
                    { text: '地主', href: 'summary_landlord.html', icon: '👑' },
                    { text: '农民', href: 'summary_farmer.html', icon: '🧑‍🌾' },
                    { text: '富农', href: 'summary_rich_farmer.html', icon: '💰' },
                    { text: '贫农', href: 'summary_poor_farmer.html', icon: '😥' }
                ];

                // 创建新的按钮元素
                const newButtonsFragment = document.createDocumentFragment();
                subButtonsData.forEach(buttonInfo => {
                    const newLi = document.createElement('li');
                    newLi.classList.add('sub-button'); // Add class for potential specific styling
                    const newA = document.createElement('a');
                    newA.href = buttonInfo.href;
                    newA.textContent = `${buttonInfo.icon} ${buttonInfo.text}`;
                    newLi.appendChild(newA);
                    newButtonsFragment.appendChild(newLi);
                });

                // 将新的按钮插入到原按钮的位置，并移除原按钮
                // We insert before the original li's "next sibling" (if it exists)
                // or just append if it's the last item.
                // A simpler way is to replace the original li with the fragment.
                // However, replaceWith expects a single Node or a string, not a DocumentFragment directly for multiple items.
                // So we insert then remove.
                
                // Insert new buttons before the "地图下载" button or at the end if "数据统计" was last
                // Or, more robustly, find the original li and replace it with the new set
                
                const otherNavItems = Array.from(mainNavUl.children).filter(child => child !== dataStatsLi);
                mainNavUl.innerHTML = ''; // Clear existing items

                // Add new sub-buttons
                newButtonsFragment.childNodes.forEach(node => {
                    mainNavUl.appendChild(node.cloneNode(true)); // Use cloneNode if appending from fragment multiple times or if fragment is modified
                });
                
                // Re-add other navigation items
                otherNavItems.forEach(item => {
                    mainNavUl.appendChild(item);
                });

                // If you want the new buttons to appear where the "数据统计" button was, and keep other buttons in their order:
                // 1. Get all children of ul.
                // 2. Find index of dataStatsLi.
                // 3. Create a new array of LIs: items before index + new buttons + items after index.
                // 4. Clear ul and append new array.

                // Let's try a slightly different replacement logic that's cleaner:
                // This ensures new buttons are inserted where the old one was.
                // mainNavUl.replaceChild(newButtonsFragment, dataStatsLi); // This won't work as replaceChild expects a single Node, not a fragment for multiple items.
                
                // The current logic re-adds other items, which works.
                // An alternative for inserting in place:
                // dataStatsLi.before(newButtonsFragment); // Insert fragment before the original li
                // dataStatsLi.remove(); // Then remove the original li

                // The logic above (clearing and re-adding) effectively replaces the "数据统计" part and appends others.
                // If "数据统计" was first, new buttons are first. If it was middle, they'd be first then others.
                // To maintain order if "数据统计" isn't the first item:
                // Store the next sibling of dataStatsLi
                // const nextSibling = dataStatsLi.nextElementSibling;
                // dataStatsLi.remove(); // Remove original button
                // if (nextSibling) {
                //    mainNavUl.insertBefore(newButtonsFragment, nextSibling);
                // } else {
                //    mainNavUl.appendChild(newButtonsFragment);
                // }
                // This is cleaner. Let's use this refined logic.
            });
        }

        // REFINED SCRIPT LOGIC
        document.addEventListener('DOMContentLoaded', function() {
            // Auto-update year (already here)
            const currentYearEl = document.getElementById('currentYear');
            if (currentYearEl) {
                 currentYearEl.textContent = new Date().getFullYear();
            }

            const dataStatsLinkEl = document.getElementById('dataStatsLink');
            const dataStatsLiEl = document.getElementById('dataStatsLi');
            const mainNavUlEl = document.getElementById('mainNavUl');

            if (dataStatsLinkEl && dataStatsLiEl && mainNavUlEl) {
                dataStatsLinkEl.addEventListener('click', function(event) {
                    event.preventDefault(); 

                    const subButtonsData = [
                        { text: '总览', href: 'summary_all_roles.html', icon: '📊' },
                        { text: '地主', href: 'summary_landlord.html', icon: '👑' },
                        { text: '农民', href: 'summary_farmer.html', icon: '🧑‍🌾' },
                        { text: '富农', href: 'summary_rich_farmer.html', icon: '💰' },
                        { text: '贫农', href: 'summary_poor_farmer.html', icon: '😥' }
                    ];

                    const newButtonsFragment = document.createDocumentFragment();
                    subButtonsData.forEach(buttonInfo => {
                        const newLi = document.createElement('li');
                        newLi.classList.add('sub-button'); 
                        const newA = document.createElement('a');
                        newA.href = buttonInfo.href;
                        newA.textContent = `${buttonInfo.icon} ${buttonInfo.text}`;
                        newLi.appendChild(newA);
                        newButtonsFragment.appendChild(newLi);
                    });

                    // Insert the new buttons before the original "数据统计" li, then remove the original.
                    // This effectively replaces the original li with the new set of lis.
                    dataStatsLiEl.before(newButtonsFragment);
                    dataStatsLiEl.remove();
                    
                    // Since the original link is removed, the event listener is also gone,
                    // so it won't trigger again on the new buttons.
                });
            }
        });
    </script>

</body>
</html>
